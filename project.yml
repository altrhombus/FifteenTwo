name: FifteenTwo
options:
  bundleIdPrefix: com.altrhombus
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
    watchOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Automatic signing, matching a normal new Xcode project's default. Requires an
    # Apple ID signed into Xcode (Settings > Accounts) — a free Personal Team is enough
    # for local Simulator/Mac/device runs. The paid Apple Developer Program membership
    # is only needed later, for TestFlight and multi-device Multipeer/SharePlay testing.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: P4JTHDWLAJ

packages:
  CribbageKit:
    path: Packages/CribbageKit
  CribbageBoardKit:
    path: Packages/CribbageBoardKit
  CribbageSync:
    path: Packages/CribbageSync
  CribbageVision:
    path: Packages/CribbageVision
  CribbageData:
    path: Packages/CribbageData
  CribbageUI:
    path: Packages/CribbageUI

targets:
  FifteenTwo-iOS:
    type: application
    platform: iOS
    sources:
      - App-iOS
    info:
      path: App-iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Required since iOS 14 for Multipeer/Bonjour discovery (Phase 11) — without
        # these, MCNearbyServiceAdvertiser/Browser silently fail to find any peers.
        NSLocalNetworkUsageDescription: >-
          Fifteen Two uses your local network to find nearby players for pass-and-play
          cribbage.
        NSBonjourServices:
          - _fifteentwo-cr._tcp
          - _fifteentwo-cr._udp
        # Required for Vision hand-scanning (Phase 13) — photographing a real dealt hand
        # for discard-analysis coaching.
        NSCameraUsageDescription: >-
          Fifteen Two uses the camera to scan a real dealt hand of cards for discard
          analysis.
    entitlements:
      path: App-iOS/FifteenTwo.entitlements
      properties:
        com.apple.developer.game-center: true
        # Post-MVP: Widgets/Live Activities. Per docs/plan.md, this is set up before any
        # widget exists so SwiftData already lives in the shared container -- retrofitting
        # an App Group onto an existing store later needs a data migration, doing it now
        # doesn't (there's no shipped user data yet).
        com.apple.security.application-groups:
          - group.com.altrhombus.FifteenTwo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altrhombus.FifteenTwo
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: CribbageKit
      - package: CribbageBoardKit
      - package: CribbageSync
      - package: CribbageVision
      - package: CribbageData
      - package: CribbageUI
      - target: FifteenTwo-Watch
        embed: true
        codeSignOnCopy: true
      - target: FifteenTwoWidgets
        embed: true
        codeSignOnCopy: true

  FifteenTwo-macOS:
    type: application
    platform: macOS
    sources:
      - App-macOS
    info:
      path: App-macOS/Info.plist
      properties:
        NSLocalNetworkUsageDescription: >-
          Fifteen Two uses your local network to find nearby players for pass-and-play
          cribbage.
        NSBonjourServices:
          - _fifteentwo-cr._tcp
          - _fifteentwo-cr._udp
    entitlements:
      path: App-macOS/FifteenTwo.entitlements
      properties:
        com.apple.developer.game-center: true
        # Not adding com.apple.security.application-groups here yet: on macOS this
        # interacts with App Sandbox (which this target doesn't currently enable), and
        # the widget itself is iOS-only for now -- scoping the App Group to iOS avoids an
        # unverified sandboxing combination for no current benefit.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altrhombus.FifteenTwo.mac
        ENABLE_HARDENED_RUNTIME: "YES"
    dependencies:
      - package: CribbageKit
      - package: CribbageBoardKit
      - package: CribbageSync
      - package: CribbageVision
      - package: CribbageData
      - package: CribbageUI

  FifteenTwoWidgets:
    # Post-MVP: Widgets/Live Activities. Embedded in FifteenTwo-iOS (above); reads the
    # same App-Group-shared SwiftData store the app writes to. iOS-only for now — see
    # project.yml's note on FifteenTwo-macOS about why the App Group isn't there yet.
    type: app-extension
    platform: iOS
    sources:
      - Widgets
    info:
      path: Widgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/FifteenTwoWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.altrhombus.FifteenTwo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altrhombus.FifteenTwo.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: "YES"
    dependencies:
      - package: CribbageKit
      - package: CribbageBoardKit
      - package: CribbageData
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  FifteenTwo-Watch:
    # A proper companion to FifteenTwo-iOS (embedded above) for WatchConnectivity
    # pairing, per docs/plan.md's watchOS Companion section — not standalone.
    type: application
    platform: watchOS
    sources:
      - Watch
    info:
      path: Watch/Info.plist
      properties:
        WKApplication: true
        WKRunsIndependentlyOfCompanionApp: false
        WKCompanionAppBundleIdentifier: com.altrhombus.FifteenTwo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altrhombus.FifteenTwo.watchkitapp
    dependencies:
      - package: CribbageKit
      - package: CribbageBoardKit
      - package: CribbageUI
